name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest # Required for iOS/XCFramework compilation
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21' # Matches java in libs.versions.toml
          distribution: 'zulu'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Run Static Analysis (Detekt)
        run: ./gradlew detekt

      - name: Compile and Assemble Targets
        run: ./gradlew assemble

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Verify Code Coverage Thresholds
        run: ./gradlew jacocoTestCoverageVerification
